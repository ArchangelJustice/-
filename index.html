<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: #00ff41; font-family: sans-serif; text-align: center; padding: 20px; }
        #status { font-size: 12px; color: #888; margin-bottom: 10px; }
        .btn { background: #00ff41; color: #000; padding: 10px; border: none; border-radius: 5px; width: 100%; margin-top: 10px; }
        input { width: 90%; padding: 10px; background: #333; border: 1px solid #00ff41; color: #fff; margin-bottom: 10px; }
        #player { width: 100%; height: 300px; border: 1px solid #333; margin-top: 20px; background: #000; }
    </style>
</head>
<body>
    <div id="status">Система инициализирована...</div>
    <h3>ARCH-TUBE BYPASS</h3>
    <input type="text" id="url" placeholder="Вставь ссылку YouTube">
    <button class="btn" onclick="play()">ЗАПУСТИТЬ ПОТОК</button>
    <div id="player">
        <div style="padding-top: 130px; color: #444;">Плеер готов к работе</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        document.getElementById('status').innerText = "Коннект с Telegram: OK";

        function play() {
            const val = document.getElementById('url').value;
            const vid = val.split('v=')[1] || val.split('/').pop();
            if(vid) {
                document.getElementById('status').innerText = "Загрузка ID: " + vid;
                // Используем embed-ссылку, она разрешена во фреймах
                const embed = `https://www.youtube-nocookie.com/embed/${vid.split('&')[0]}?autoplay=1`;
                document.getElementById('player').innerHTML = `<iframe src="${embed}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
            } else {
                alert("Ошибка: Ссылка не распознана");
            }
        }
    </script>
</body>
</html>
